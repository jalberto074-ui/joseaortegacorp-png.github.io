<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Alberto Ortega | Data Universe</title>
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

    <!-- Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
            }
        }
    </script>
</head>

<body>
    <!-- Overlay UI (Fixed) -->
    <div id="ui-container">
        <header class="main-header">
            <div class="logo">JOSE ALBERTO ORTEGA</div>
            <div class="subtitle">DATA ANALYTICS &amp; AUTOMATION</div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container"
            style="position: fixed; top: 0; left: 0; width: 100%; height: 2px; z-index: 100;">
            <div id="progress-bar" style="height: 100%; width: 0%; background: #66fcf1; transition: width 0.1s;"></div>
        </div>

        <div class="footer-controls">
            <!-- Hint removed, moved to Intro Title -->
        </div>
    </div>

    <!-- 3D Canvas Container -->
    <canvas id="canvas"></canvas>

    <!-- Scroll Snap Container -->
    <main id="scroll-container">
        <!-- Section 0: Intro / Sphere -->
        <section class="snap-section">
            <div class="intro-title">
                <h1>ONE PERSON.</h1>
                <h2>A UNIVERSE OF OPPORTUNITIES.</h2>
                <div class="scroll-hint">
                    <div class="mouse-icon"></div>
                    <span>SCROLL TO DIVE IN</span>
                </div>
            </div>
        </section>

        <!-- Section 1: Analysis -->
        <section class="snap-section"></section>

        <!-- Section 2: SQL -->
        <section class="snap-section"></section>

        <!-- Section 3: Marketing -->
        <section class="snap-section"></section>

        <!-- Section 4: Engineering -->
        <section class="snap-section"></section>

        <!-- Section 5: IT -->
        <section class="snap-section"></section>

        <!-- Section 6: BI -->
        <section class="snap-section"></section>

        <!-- Section 7: Contact (Exit) -->
        <section class="snap-section contact-section">
            <div class="contact-content">
                <h2>READY TO LAUNCH?</h2>
                <p>Let's build your data strategy together.</p>

                <form class="contact-form">
                    <input type="text" placeholder="NAME" required>
                    <input type="email" placeholder="EMAIL" required>
                    <textarea placeholder="MESSAGE" rows="4"></textarea>
                    <button type="submit">INITIATE SEQUENCE</button>
                </form>

                <div class="contact-details">
                    <span>+58 412 263 9814</span>
                    <span>jalberto074@gmail.com</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Click Interaction Layover -->
    <div id="click-zone"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: pointer; display: none;">
    </div>

    <!-- Detail Overlay (Full Screen) -->
    <div id="detail-overlay" class="overlay-container">
        <button class="close-detail-btn">&times;</button>
        <div class="detail-content">
            <h1 id="detail-title">TITLE</h1>
            <div class="detail-body">
                <p>Detailed description of this skill...</p>
                <ul>
                    <li>Achievement 1</li>
                    <li>Achievement 2</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
